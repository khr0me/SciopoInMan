[versions]
jme = "3.9.0-stable"

appcompat = "1.4.0"
googleMaterial = "1.4.0"
constraintlayout = "2.1.1"
junit4 = "4.13.2"
androidxTestJunit = "1.1.3"
espressoCore = "3.4.0"

heart = '8.6.0'
minie = '7.7.0'
particlemonkey = '1.0.2'
lemur = '1.16.0'
